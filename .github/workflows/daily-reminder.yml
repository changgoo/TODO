name: Daily Q1 Reminder

on:
  schedule:
    - cron: '0 15 * * 1-5'  # 11 AM EDT (UTC-4), weekdays; adjust to '0 16 * * 1-5' in winter (EST)
  workflow_dispatch:          # allow manual trigger for testing

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Q1 todos and send email
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          TO_EMAIL: ${{ secrets.SENDGRID_TO_EMAIL }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, subprocess

          import re, datetime, zoneinfo

          # Fetch issue body via gh CLI
          result = subprocess.run(
              ["gh", "api", f"repos/{os.environ['REPO']}/issues/1", "--jq", ".body"],
              capture_output=True, text=True, check=True
          )
          body = result.stdout

          def extract_todos(body, section_start, section_end):
              """Extract unchecked top-level tasks from a section."""
              in_section = False
              todos = []
              for line in body.splitlines():
                  if line.startswith(f"## {section_start}"):
                      in_section = True
                      continue
                  if in_section and line.startswith(f"## {section_end}"):
                      break
                  if in_section and line.startswith("- [ ] "):
                      label = line[6:].strip()
                      # Strip markdown: **bold**, *italic*, ⬅ annotations
                      label = re.sub(r'\*+([^*]+)\*+', r'\1', label)
                      label = re.sub(r'⬅.*$', '', label).strip()
                      todos.append(label)
              return todos

          q1_todos = extract_todos(body, "Q1", "Q2")
          q2_todos = extract_todos(body, "Q2", "Q3")

          et = zoneinfo.ZoneInfo("America/New_York")
          date_str = datetime.datetime.now(et).strftime("%A, %B %d %Y")

          def section_plain(title, todos, empty_msg):
              if todos:
                  bullets = "\n".join(f"  • {t}" for t in todos)
                  return f"{title}:\n{bullets}"
              return f"{title}:\n  {empty_msg}"

          def section_html(title, todos, empty_msg):
              if todos:
                  items = "\n".join(f"<li>{t}</li>" for t in todos)
                  return f"<h3 style='margin-bottom:4px'>{title}</h3><ul style='margin-top:4px'>{items}</ul>"
              return f"<h3 style='margin-bottom:4px'>{title}</h3><p><em>{empty_msg}</em></p>"

          plain = (
              f"Good morning! Here are your priorities for {date_str}:\n\n"
              + section_plain("Q1 — Urgent + Important (Do First)", q1_todos, "All done!") + "\n\n"
              + section_plain("Q2 — Important, Not Urgent (Schedule)", q2_todos, "Nothing scheduled.") + "\n\n"
              + "Good luck today!"
          )
          html = f"""
          <div style="font-family:sans-serif;max-width:600px;margin:auto">
            <p>Good morning! Here are your priorities for <strong>{date_str}</strong>:</p>
            {section_html("Q1 — Urgent + Important", q1_todos, "All done!")}
            {section_html("Q2 — Important, Not Urgent", q2_todos, "Nothing scheduled.")}
            <p style="color:#888;font-size:12px">Good luck today!</p>
          </div>
          """

          payload = {
              "personalizations": [{"to": [{"email": os.environ["TO_EMAIL"]}]}],
              "from": {"email": os.environ["TO_EMAIL"], "name": "Daily TODO Reminder"},
              "subject": f"Q1 Priorities for {date_str}",
              "content": [
                  {"type": "text/plain", "value": plain},
                  {"type": "text/html",  "value": html},
              ],
          }

          req = urllib.request.Request(
              "https://api.sendgrid.com/v3/mail/send",
              data=json.dumps(payload).encode(),
              headers={
                  "Authorization": f"Bearer {os.environ['SENDGRID_API_KEY']}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Email sent! Status: {resp.status}")
          except urllib.error.HTTPError as e:
              print(f"SendGrid error {e.code}: {e.read().decode()}")
              raise
          PYEOF
