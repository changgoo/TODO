name: Daily Q1 Reminder

on:
  schedule:
    - cron: '0 15 * * 1-5'  # 11 AM EDT (UTC-4), weekdays; adjust to '0 16 * * 1-5' in winter (EST)
  workflow_dispatch:          # allow manual trigger for testing

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Q1 todos and send email
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          TO_EMAIL: ${{ secrets.SENDGRID_TO_EMAIL }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, subprocess

          # Fetch issue body via gh CLI
          result = subprocess.run(
              ["gh", "api", f"repos/{os.environ['REPO']}/issues/1", "--jq", ".body"],
              capture_output=True, text=True, check=True
          )
          body = result.stdout

          # Extract unchecked Q1 top-level tasks (lines starting with "- [ ]" in Q1 section)
          in_q1 = False
          todos = []
          for line in body.splitlines():
              if line.startswith("## Q1"):
                  in_q1 = True
                  continue
              if in_q1 and line.startswith("## "):
                  break
              if in_q1 and line.startswith("- [ ] "):
                  todos.append(line[6:].strip())  # strip "- [ ] "

          import datetime, zoneinfo
          et = zoneinfo.ZoneInfo("America/New_York")
          date_str = datetime.datetime.now(et).strftime("%A, %B %d %Y")

          if todos:
              bullet_plain = "\n".join(f"  • {t}" for t in todos)
              bullet_html  = "\n".join(f"<li>{t}</li>" for t in todos)
              plain = f"Good morning! Here are your Q1 priorities for {date_str}:\n\n{bullet_plain}\n\nGood luck today!"
              html  = f"<p>Good morning! Here are your <strong>Q1 priorities</strong> for {date_str}:</p><ul>{bullet_html}</ul><p>Good luck today!</p>"
          else:
              plain = f"Good morning! All Q1 tasks are complete as of {date_str}. Great work!"
              html  = f"<p>Good morning! All Q1 tasks are complete as of {date_str}. Great work!</p>"

          payload = {
              "personalizations": [{"to": [{"email": os.environ["TO_EMAIL"]}]}],
              "from": {"email": os.environ["TO_EMAIL"], "name": "Daily TODO Reminder"},
              "subject": f"Q1 Priorities for {date_str}",
              "content": [
                  {"type": "text/plain", "value": plain},
                  {"type": "text/html",  "value": html},
              ],
          }

          req = urllib.request.Request(
              "https://api.sendgrid.com/v3/mail/send",
              data=json.dumps(payload).encode(),
              headers={
                  "Authorization": f"Bearer {os.environ['SENDGRID_API_KEY']}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Email sent! Status: {resp.status}")
          except urllib.error.HTTPError as e:
              print(f"SendGrid error {e.code}: {e.read().decode()}")
              raise
          PYEOF
