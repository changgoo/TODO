name: SFIR Day-of Reminder (1 hour before)

on:
  schedule:
    - cron: '0 18 * * 1'  # 2 PM ET every Monday (EDT=UTC-4), 1 hour before 3 PM Spring talks
                           # Fall talks are at 4 PM — for those weeks, trigger manually or adjust cron
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send day-of reminder to sfir@princeton.edu
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python3 scripts/sfir_email.py --mode dayof
