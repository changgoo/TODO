name: SFIR Day-of Reminder (9 AM)

on:
  schedule:
    - cron: '0 13 * * 1'  # 9 AM ET every Monday (EDT=UTC-4)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send day-of reminder to sfir@princeton.edu
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python3 SFIR/sfir_email.py --mode dayof
