name: SFIR Day-of Reminder (1 hour before)

on:
  schedule:
    - cron: '0 19 * * 1'  # 3 PM ET every Monday (EDT=UTC-4), 1 hour before 4 PM talks
                           # Note: the Feb 16 talk is at 3 PM — for that week, trigger manually
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send day-of reminder to sfir@princeton.edu
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python3 scripts/sfir_email.py --mode dayof
