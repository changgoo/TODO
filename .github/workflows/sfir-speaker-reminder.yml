name: SFIR Speaker Reminder (7-day advance)

on:
  schedule:
    - cron: '0 13 * * *'  # 9 AM ET daily (EDT=UTC-4; adjust to '0 14' in winter EST)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send 7-day advance reminder to speaker
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python3 SFIR/sfir_email.py --mode speaker
