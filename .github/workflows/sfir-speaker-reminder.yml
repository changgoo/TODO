name: SFIR Speaker Reminder (7-day advance)

on:
  schedule:
    - cron: '0 13 * * 2'  # 9 AM ET daily (EDT=UTC-4; adjust to '0 14' in winter EST)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send 7-day advance reminder to speaker
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 SFIR/sfir_email.py --mode speaker
